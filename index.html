<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>練習会問題</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>練習会問題</h1>
</div>

<div class="progress-wrap">
  <div id="progress"></div>

  <div id="name-box">
  <input id="username" placeholder="名前を入力">
  <button onclick="startQuiz()">開始</button></div>
  
  <div id="quiz-box">
    <p id="question"></p>
    <div id="choices"></div>

    <div id="text-box" class="hidden">
      <input id="text-input" placeholder="回答を入力">
      <button onclick="submitText()">回答</button>
    </div>

    <button id="next" class="hidden" onclick="next()">次へ</button>
  </div>

  <div id="result" class="hidden"></div>
</div>

<script src="script.js"></script>
</body>
</html>
